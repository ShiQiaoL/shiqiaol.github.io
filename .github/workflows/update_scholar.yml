name: Update Academic Profile

on:
  schedule:
    - cron: "0 0 * * 6"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: scholar-update
  cancel-in-progress: false

jobs:
  update-publications:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "scholarly==1.7.11"

      - name: Update publications from Google Scholar
        env:
          SCHOLAR_ID: ${{ secrets.SCHOLAR_ID }}
        run: python scripts/update_scholar.py

      - name: Commit and push changes
        run: |
          if git diff --quiet --exit-code -- publications.html; then
            echo "No publication changes detected."
            exit 0
          fi

          git config user.name "Scholar-Bot"
          git config user.email "bot@users.noreply.github.com"
          git add publications.html
          git commit -m "Update publications from Google Scholar"
          git push

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Scholar update failed: ${new Date().toISOString().slice(0, 10)}`,
              body: `The scheduled Google Scholar sync failed.\n\nWorkflow run: ${runUrl}\n\nCommon causes: scholarly library API changes, Google Scholar rate-limiting, or invalid SCHOLAR_ID secret.`,
              labels: ['automation', 'bug']
            });
